<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman Kelulusan Kelas XII</title>
    <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbzxC6n2X-zbHORv44bO85UZSVI-SuunRXxAiA6z6V6cdWGfrR0gabI5kJ9bWQ-o2Wyd/exec">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 100%);
            margin: 0;
            color: white;
        }
        .redirect-container {
            text-align: center;
            padding: 2rem;
        }
        .loader {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #ffd700;
        }
    </style>
    <script>
        window.location.href = "https://script.google.com/macros/s/AKfycbzxC6n2X-zbHORv44bO85UZSVI-SuunRXxAiA6z6V6cdWGfrR0gabI5kJ9bWQ-o2Wyd/exec";
    </script>
</head>
<body>
    <div class="redirect-container">
        <div class="loader"></div>
        <p>Mengarahkan Anda ke halaman pengumuman kelulusan...</p>
        <p>Jika tidak otomatis terarah, <a href="https://script.google.com/macros/s/AKfycbzxC6n2X-zbHORv44bO85UZSVI-SuunRXxAiA6z6V6cdWGfrR0gabI5kJ9bWQ-o2Wyd/exec">klik di sini</a>.</p>
    </div>
</body>
</html>
